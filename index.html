<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ICVEE Letter of Acceptance verification page" />
  <title>ICVEE 2026 — LOA Verification</title>
  <style>
    :root {
      --primary: #233f84;
      --secondary: #3f63a7;
      --surface: #ffffff;
      --background: #eef3fb;
      --text: #1f2937;
      --muted: #667085;
      --border: #d8e0ef;
      --danger: #b42318;
      --success: #067647;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      padding: 24px;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(63, 99, 167, 0.18), transparent 32%),
        linear-gradient(135deg, #f8faff 0%, var(--background) 100%);
    }

    .card {
      width: min(100%, 560px);
      padding: 40px;
      border: 1px solid rgba(35, 63, 132, 0.14);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 20px 55px rgba(35, 63, 132, 0.15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    .brand-name {
      margin: 0;
      color: var(--primary);
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      color: #172554;
      font-size: clamp(28px, 5vw, 38px);
      line-height: 1.12;
    }

    .description {
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .field-label {
      display: block;
      margin-bottom: 9px;
      font-size: 14px;
      font-weight: 700;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 50px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background: #fff;
      font-size: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 4px rgba(63, 99, 167, 0.12);
    }

    button {
      height: 50px;
      padding: 0 24px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: wait; opacity: 0.65; transform: none; }

    .message {
      min-height: 22px;
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }

    .helper {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #edf0f6;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      body { padding: 16px; }
      .card { padding: 28px 22px; border-radius: 18px; }
      .input-wrap { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <div class="brand-mark">ICVEE</div>
      <p class="brand-name">2026 Ninth International Conference on Vocational Education and Electrical Engineering</p>
    </div>

    <h1>Letter of Acceptance</h1>
    <p class="description">
      Enter your Manuscript ID to verify the record and open the official Letter of Acceptance.
    </p>

    <form id="loaForm" novalidate>
      <label class="field-label" for="manuscriptId">Manuscript ID</label>
      <div class="input-wrap">
        <input
          id="manuscriptId"
          name="manuscriptId"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          placeholder="Example: 1571169971"
          aria-describedby="message"
          required
        />
        <button id="submitButton" type="submit">View LOA</button>
      </div>
      <p id="message" class="message" role="status" aria-live="polite"></p>
    </form>

    <div class="helper">
      The Manuscript ID must match an accepted manuscript listed in the conference database.
    </div>
  </main>

  <script>
    const form = document.getElementById('loaForm');
    const input = document.getElementById('manuscriptId');
    const button = document.getElementById('submitButton');
    const message = document.getElementById('message');

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          field += '"';
          i += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          row.push(field.trim());
          field = '';
        } else if ((char === '\n' || char === '\r') && !insideQuotes) {
          if (char === '\r' && next === '\n') i += 1;
          row.push(field.trim());
          field = '';
          if (row.some(value => value !== '')) rows.push(row);
          row = [];
        } else {
          field += char;
        }
      }

      row.push(field.trim());
      if (row.some(value => value !== '')) rows.push(row);

      if (rows.length < 2) return [];

      const headers = rows[0].map(header => header.replace(/^\uFEFF/, '').trim());
      return rows.slice(1).map(values =>
        headers.reduce((record, header, index) => {
          record[header] = values[index] ?? '';
          return record;
        }, {})
      );
    }

    function setMessage(text, type = '') {
      message.textContent = text;
      message.className = `message ${type}`.trim();
    }

    form.addEventListener('submit', async event => {
      event.preventDefault();

      const manuscriptId = input.value.trim();
      if (!manuscriptId) {
        setMessage('Please enter your Manuscript ID.', 'error');
        input.focus();
        return;
      }

      button.disabled = true;
      button.textContent = 'Checking...';
      setMessage('Checking manuscript data...');

      try {
        const response = await fetch(`/icvee-loa/data.csv?v=${Date.now()}`, { cache: 'no-store' });
        if (!response.ok) throw new Error('Unable to load data.csv');

        const records = parseCSV(await response.text());
        const record = records.find(item =>
          String(item.manuscript_id || '').trim().toLowerCase() === manuscriptId.toLowerCase()
        );

        if (!record) {
          setMessage('Manuscript ID was not found or has not been accepted.', 'error');
          return;
        }

        if (String(record.status || '').trim().toLowerCase() !== 'accepted') {
          setMessage('This manuscript is not currently marked as accepted.', 'error');
          return;
        }

        setMessage('Manuscript verified. Opening the LOA...', 'success');
        window.location.href = `/icvee-loa/loa.html?id=${encodeURIComponent(manuscriptId)}`;
      } catch (error) {
        console.error(error);
        setMessage('The manuscript database could not be loaded. Please try again.', 'error');
      } finally {
        button.disabled = false;
        button.textContent = 'View LOA';
      }
    });
  </script>
</body>
</html>
